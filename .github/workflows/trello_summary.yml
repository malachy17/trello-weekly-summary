name: Weekly Trello Summary

on:
  schedule:
    # Every Friday at 9:00 AM Pacific Daylight Time (16:00 UTC).
    # In Pacific Standard Time (winter) this becomes 8:00 AM; switch to 17:00 UTC if needed.
    - cron: "0 16 * * 5"
  workflow_dispatch:

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Trello summary
        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_URL: ${{ secrets.LLM_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          RECIPIENT_NAME: ${{ secrets.RECIPIENT_NAME }}
          RECIPIENT_ADDRESS: ${{ secrets.RECIPIENT_ADDRESS }}
          LOGO_PATH: ${{ secrets.LOGO_PATH }}
        run: python main.py
